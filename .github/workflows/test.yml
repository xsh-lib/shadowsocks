name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / ${{ matrix.shell }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # bash is the historical target; zsh is the macOS default login shell.
        # Utilities run under zsh's ksh emulation (provided by xsh >= 0.7.0).
        shell: [bash, zsh]

    steps:
      - name: Install zsh (Linux)
        if: matrix.shell == 'zsh' && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Install xsh
        run: |
          git clone --depth=50 --branch=master https://github.com/alexzhangs/xsh.git /tmp/xsh
          bash /tmp/xsh/install.sh

      - name: Load dependency library xsh-lib/core
        shell: bash
        run: |
          source ~/.xshrc
          xsh load xsh-lib/core

      - name: Load library from current branch
        shell: bash
        run: |
          source ~/.xshrc
          xsh load -b "${{ github.head_ref || github.ref_name }}" xsh-lib/shadowsocks

      - name: Run tests (${{ matrix.shell }})
        # test.sh self-sources ~/.xshrc, so running it under the matrix shell
        # makes the utilities execute under that shell (bash, or zsh's ksh
        # emulation).
        run: ${{ matrix.shell }} ~/.xsh/repo/xsh-lib/shadowsocks/test.sh
